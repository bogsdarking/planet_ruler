# Planet Ruler – Synthetic Parameter Grid (Phase 1)
#
# Full-factorial sweep on two representative images to characterise every
# interaction among free_parameters, search bounds, compute budget, and
# minimizer choice.  Run with BenchmarkRunner; the ``grid:`` section is
# expanded at runtime – no hand-written scenario list needed.
#
# Phase 2: run select_phase2.py against the result DB to pick top performers
# for validation on all 15 synthetic images.
#
# Axes:
#   free_parameters  – 6 sets (r only → all 7 params)
#   r_limits_km      – 5 tightness levels (±5 % … rocky-planet range)
#   h_limits_pct     – 4 levels (unconstrained, ±10/20/30 % of GPS h)
#                      only applied when h is free
#   perturbation_factor – 3 levels (0.0 / 0.25 / 0.50)
#   max_iter         – 3 levels (300 / 2000 / 10000)
#   minimizer × preset:
#     DE  × {fast, balanced, planet-ruler, robust, scipy-default}   = 5
#     DA  × {fast, balanced, robust, scipy-default}                 = 4
#                                                                   ───
#                                                                     9
#
# Total scenarios per image (h-conditionality applied):
#   [r] only  : 1 × 5 × 1 × 3 × 3 × 9 =   405
#   5 h-free  : 5 × 5 × 4 × 3 × 3 × 9 = 8 100
#               ──────────────────────────────
#               8 505 per image × 2 images = 17 010 unique scenarios
#   × 5 augmentation variants             = 85 050 total optimizer runs

grid:
  images:
    - synth_iphone_13_h10km_clean
    - synth_sm-s906e_h10km_clean

  annotation_file_pattern: "{image}_limb_points.json"

  # Keys in ``fixed`` are merged into every generated scenario unchanged.
  fixed:
    detection_method: manual
    planet_name: Earth
    expected_radius: 6371000
    uncertainty_radius: 10000
    # theta_z=π is the correct orientation for synthetic images; override
    # both the init value and the search bounds so π is always reachable.
    init_parameter_values_override: {theta_z: 3.14159}
    parameter_limits_override: {theta_z: [-3.1416, 3.1416]}
    augmentation:
      n_variants: 5
      noise_sigma: 2.0
      seed: 0

  # Reusable anchors -------------------------------------------------------
  _free_params: &FREE_PARAMS
    # - [r]
    # - [r, h]
    - [r, h, theta_x, theta_y, theta_z]
    - [r, h, theta_x, theta_y, theta_z, w]
    - [r, h, theta_x, theta_y, theta_z, f]
    - [r, h, theta_x, theta_y, theta_z, w, f]

  _r_limits: &R_LIMITS
    - [6053, 6690]    # ±5 %  of Earth r
    - [5734, 7009]    # ±10 %
    - [5097, 7645]    # ±20 %
    - [3186, 9557]    # ±50 %
    - [2000, 14000]   # rocky-planet range

  _h_limits: &H_LIMITS
    - null            # scipy-default wide bounds (unconstrained)
    - 0.10            # ±10 % of GPS h
    - 0.20            # ±20 %
    - 0.30            # ±30 %

  _pf: &PF
    - 0.0
    - 0.25
    - 0.50

  _iter: &ITER
    - 300
    - 2000
    - 10000

  # param_grid: list of dicts; each dict is cross-producted independently
  # then results are unioned (identical to sklearn GridSearchCV).
  param_grid:

    # ── Differential Evolution (5 presets) ─────────────────────────────
    - minimizer: differential-evolution
      minimizer_preset:
        - fast
        - balanced
        - planet-ruler
        - robust
        - scipy-default
      free_parameters: *FREE_PARAMS
      r_limits_km: *R_LIMITS
      h_limits_pct: *H_LIMITS
      perturbation_factor: *PF
      fit_params_max_iter: *ITER

    # ── Dual Annealing (4 presets – no planet-ruler) ────────────────────
    - minimizer: dual-annealing
      minimizer_preset:
        - fast
        - balanced
        - robust
        - scipy-default
      free_parameters: *FREE_PARAMS
      r_limits_km: *R_LIMITS
      h_limits_pct: *H_LIMITS
      perturbation_factor: *PF
      fit_params_max_iter: *ITER

thresholds:
  max_time: 3600.0
  max_relative_error: 0.20
  min_success_rate: 0.20
