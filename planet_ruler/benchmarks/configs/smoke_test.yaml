# Smoke Test Configuration
#
# Uses synthetic images so the annotation file always exists and ground truth
# is known exactly.  All three scenarios keep max_iter low so CI finishes in
# well under a minute.

scenarios:
  # --- manual (annotation-driven) smoke ---
  - name: "smoke_manual_1free"
    images: ["synth_iphone_13_h10km_clean"]
    detection_method: "manual"
    annotation_file: "synth_iphone_13_h10km_clean_limb_points.json"
    planet_name: "Earth"
    expected_radius: 6371000
    uncertainty_radius: 10000
    free_parameters: ["r"]
    r_limits_km: [3186, 9557]   # ±50% of Earth radius
    perturb_params: [r]
    fit_params:
      max_iter: 30
    minimizer: "differential-evolution"

  # --- gradient-field fast smoke ---
  - name: "smoke_gradient_1free"
    images: ["synth_iphone_13_h10km_clean"]
    detection_method: "gradient-field"
    planet_name: "Earth"
    expected_radius: 6371000
    uncertainty_radius: 10000
    free_parameters: ["r"]
    r_limits_km: [3186, 9557]   # ±50% of Earth radius
    perturb_params: [r]
    fit_params:
      max_iter: 30
      resolution_stages: [4]
    minimizer: "differential-evolution"

  # --- gradient-field multi-res smoke ---
  - name: "smoke_gradient_multires_1free"
    images: ["synth_iphone_13_h10km_clean"]
    detection_method: "gradient-field"
    planet_name: "Earth"
    expected_radius: 6371000
    uncertainty_radius: 10000
    free_parameters: ["r"]
    r_limits_km: [3186, 9557]   # ±50% of Earth radius
    perturb_params: [r]
    fit_params:
      max_iter: 50
      resolution_stages: [8, 4, 2, 1]
    minimizer: "differential-evolution"

thresholds:
  max_time: 240.0            # seconds per scenario; synth+1-free is fast
  max_relative_error: 0.30  # regression guard: gradient smoke ~25% at low iter
  min_success_rate: 0.90
